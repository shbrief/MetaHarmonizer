name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          # FAISS is deliberately not a wheel dependency: the PyPI faiss-cpu
          # wheel bundles its own libomp, which collides with torch's libomp
          # and segfaults on macOS (see pyproject.toml). That conflict is
          # macOS-only, so installing the pip wheel on the Linux CI runner is
          # safe and lets the ontology-mapper tests import faiss.
          pip install faiss-cpu

      - name: Run fast tests
        run: pytest tests/ -v
