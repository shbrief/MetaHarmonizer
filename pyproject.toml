[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "metaharmonizer"
version = "0.2.4"
description = "Biomedical metadata harmonization: ontology mapping, schema mapping, and field suggestion"
requires-python = ">=3.10"
readme = "readme.md"
license = { text = "MIT" }
authors = [
    { name = "Sehyun Oh" },
    { name = "Abhilash Dhal", email = "adhalbiophysics@gmail.com" },
]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
]
dependencies = [
    # Core data and ML
    "pandas",
    "numpy",
    "torch",
    "transformers",
    "sentence-transformers",
    "scikit-learn",
    # Vector search
    "faiss-cpu==1.11.0",
    # RAG and LLM
    "langchain",
    "google-generativeai",
    # Fuzzy matching
    "rapidfuzz",
    "thefuzz",
    # Async HTTP and retry
    "httpx",
    "tenacity",
    "aiolimiter",
    "nest-asyncio",
    # Utilities
    "requests",
    "python-dotenv",
    "PyYAML",
    "huggingface_hub",
    "openpyxl",
    "nltk",
    "tqdm",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-cov",
]

# Keep src.* import paths working without renaming the source directory.
# After `pip install -e .` or `pip install git+https://github.com/...`,
# `from src.field_suggester import FieldSuggester` continues to work.
[tool.setuptools]
package-dir = { "" = "." }

[tool.setuptools.packages.find]
where = ["."]
include = ["src*"]

[tool.setuptools.package-data]
# Bundle the method→model YAML that lives inside src/models/.
# The data/ corpus directory at the repo root is NOT bundled in the wheel;
# installed users must set METAHARMONIZER_DATA_DIR to their local copy.
"src.models" = ["method_model.yaml"]

[tool.pytest.ini_options]
